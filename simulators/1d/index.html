<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simulador 1D</title>
  <style>body{font-family:Arial;margin:12px}canvas{background:#f7f7f7;border:1px solid #ddd}</style>
</head>
<body>
  <h2>Simulador 1D — Primera Ley de Newton</h2>

  <style>
    .sim-container { display:flex; gap:16px; align-items:flex-start; }
    .controls { display:flex; flex-direction:column; gap:10px; width:300px; }
    .control { display:flex; flex-direction:column; }
    .control label { font-size:13px; margin-bottom:4px; }
    input[type="range"] { width:100%; }
    .buttons { display:flex; gap:8px; margin-top:6px }
    .info { margin-top:10px; font-family:monospace }
  </style>

  <div class="sim-container">
    <div data-slot="visual">
      <canvas id="sim" width="800" height="200"></canvas>
    </div>

    <div data-slot="controls" class="controls">
      <div class="control">
        <label for="mass">Masa (kg) <span id="massVal">1.0</span></label>
        <input id="mass" type="range" min="0.1" max="10" step="0.1" value="1">
      </div>

      <div class="control">
        <label for="vel">Velocidad inicial (m/s) <span id="velVal">2.0</span></label>
        <input id="vel" type="range" min="-10" max="10" step="0.1" value="2">
      </div>

      <div class="control">
        <label for="force">Fuerza aplicada (N) <span id="forceVal">0</span></label>
        <input id="force" type="range" min="-50" max="50" step="1" value="0">
        <div style="display:flex; gap:8px; align-items:center; margin-top:6px">
          <input id="continuous" type="checkbox"><label for="continuous" style="margin:0">Fuerza continua</label>
        </div>
      </div>

      <div class="control">
        <label><input id="fric" type="checkbox"> Activar fricción</label>
        <label for="mu">μ (coef.) <span id="muVal">0.10</span></label>
        <input id="mu" type="range" min="0" max="1" step="0.01" value="0.1">
      </div>

      <div class="buttons">
        <button id="impulse">Aplicar impulso</button>
        <button id="start">Iniciar</button>
        <a href="../../index.html" style="margin-left:8px">Volver</a>
      </div>
    </div>
  </div>

  <div data-slot="info" class="info">Pos: <span id="pos">0</span> m — Vel: <span id="velDisp">0</span> m/s — Acel: <span id="acc">0</span> m/s²</div>

  <script type="module" src="../../main.js"></script>
</body>
</html>
