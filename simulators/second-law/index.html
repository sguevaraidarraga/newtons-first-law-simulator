<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Segunda Ley — Plano Inclinado</title>
  <style>body{font-family:Arial;margin:12px}canvas{background:#f7f7f7;border:1px solid #ddd}</style>
</head>
<body>
  <h2>Segunda Ley de Newton — Plano Inclinado</h2>

  <style>
    .sim-container { display:flex; gap:16px; align-items:flex-start; }
    .controls { display:flex; flex-direction:column; gap:10px; width:300px; }
    .control { display:flex; flex-direction:column; }
    .control label { font-size:13px; margin-bottom:4px; }
    input[type="range"] { width:100%; }
    .buttons { display:flex; gap:8px; margin-top:6px }
    .info { margin-top:10px; font-family:monospace }
  </style>

  <div class="sim-container">
    <div data-slot="visual">
      <canvas id="sim" width="800" height="300"></canvas>
    </div>

    <div data-slot="controls" class="controls">
      <div class="control">
        <label for="angle">Ángulo (deg) <span id="angleVal">30</span></label>
          <input id="angle" type="range" min="0" max="90" step="1" value="30">
      </div>

      <div class="control">
        <label for="mass">Masa (kg) <span id="massVal">1.0</span></label>
        <input id="mass" type="range" min="0.1" max="10" step="0.1" value="1">
      </div>

      <div class="control">
        <label><input id="fric" type="checkbox"> Activar fricción</label>
        <label for="mu">μ (coef.) <span id="muVal">0.10</span></label>
        <input id="mu" type="range" min="0" max="1" step="0.01" value="0.1">
      </div>

      <div class="control">
        <label for="initS">Posición inicial s (m) <span id="sVal">0.0</span></label>
        <input id="initS" type="range" min="0" max="5" step="0.1" value="0">
      </div>

      <div class="control">
        <label for="initV">Velocidad inicial (m/s) <span id="vVal">0.0</span></label>
        <input id="initV" type="range" min="-10" max="10" step="0.1" value="0">
      </div>

      <div class="buttons">
        <button id="start">Iniciar</button>
        <button id="reset">Reset</button>
        <a href="../../index.html" style="margin-left:8px">Volver</a>
      </div>
    </div>
  </div>

  <div data-slot="info" class="info">
    s: <span id="sDisp">0</span> m — v: <span id="vDisp">0</span> m/s — a: <span id="aDisp">0</span> m/s²
    <br>
    Fuerzas: F_net: <span id="Fnet">0</span> N
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
